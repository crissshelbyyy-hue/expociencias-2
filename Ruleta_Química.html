<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta de Química</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #e3f2fd;
        text-align: center;
        padding-top: 40px;
    }

    h1 {
        color: #0d47a1;
    }

    .ruleta-container {
        position: relative;
        width: 300px;
        height: 300px;
        margin: 30px auto;
    }

    .ruleta {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 8px solid #1565c0;
        background: conic-gradient(
            #bbdefb 0deg 60deg,
            #90caf9 60deg 120deg,
            #64b5f6 120deg 180deg,
            #42a5f5 180deg 240deg,
            #2196f3 240deg 300deg,
            #1e88e5 300deg 360deg
        );
        transition: transform 3s ease-out;
    }

    .flecha {
        position: absolute;
        top: -20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 30px;
    }

    button {
        padding: 12px 25px;
        font-size: 16px;
        background-color: #1565c0;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background-color: #0d47a1;
    }

    #resultado {
        margin-top: 20px;
        font-weight: bold;
    }
</style>
</head>

<body>

<h1>🎡 Ruleta de Química</h1>

<div class="ruleta-container">
    <div class="flecha">⬇️</div>
    <div class="ruleta" id="ruleta"></div>
</div>

<button onclick="girar()">🎲 Girar Ruleta</button>

<p id="resultado"></p>

<script>
const preguntas = [
    "¿Cuál es el símbolo del agua?",
    "¿Qué partícula tiene carga negativa?",
    "¿Cuál es el pH del agua pura?",
    "¿Qué elemento tiene el símbolo Na?",
    "¿Qué gas necesitamos para respirar?",
    "¿Cómo se llama la tabla de los elementos?"
];

let anguloActual = 0;

function girar() {
    const ruleta = document.getElementById("ruleta");
    const giro = Math.floor(Math.random() * 360) + 720;
    anguloActual += giro;
    ruleta.style.transform = `rotate(${anguloActual}deg)`;

    setTimeout(() => {
        const seccion = Math.floor(((anguloActual % 360) / 60));
        document.getElementById("resultado").textContent =
            "🧪 Pregunta: " + preguntas[5 - seccion];
    }, 3000);
}
</script>

</body>
</html>
