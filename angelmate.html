<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mini Juego</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(#87CEEB, #ffffff);
        text-align: center;
        padding: 20px;
    }

    h1 {
        color: #ff6600;
    }

    #game {
        background: white;
        padding: 20px;
        border-radius: 15px;
        width: 300px;
        margin: auto;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    .btn {
        display: block;
        margin: 10px auto;
        padding: 10px;
        width: 80%;
        border: none;
        border-radius: 10px;
        font-size: 18px;
        cursor: pointer;
    }

    .btn:hover {
        opacity: 0.8;
    }

    .green { background: #4CAF50; color: white; }
    .blue { background: #2196F3; color: white; }
    .orange { background: #ff9800; color: white; }
    .purple { background: #9c27b0; color: white; }

    #score, #timer {
        font-size: 20px;
        margin: 10px;
    }
</style>
</head>
<body>

<h1>🎲 Mundo Matemático</h1>

<div id="game">
    <div id="score">⭐ Puntos: 0</div>
    <div id="timer">⏱ Tiempo: 30</div>

    <h2 id="question">?</h2>

    <button class="btn green" onclick="checkAnswer(this)"></button>
    <button class="btn blue" onclick="checkAnswer(this)"></button>
    <button class="btn orange" onclick="checkAnswer(this)"></button>
    <button class="btn purple" onclick="checkAnswer(this)"></button>
</div>

<script>
let score = 0;
let correctAnswer = 0;
let time = 30;

function newQuestion() {
    let a = Math.floor(Math.random() * 20);
    let b = Math.floor(Math.random() * 20);

    correctAnswer = a + b;

    document.getElementById("question").innerText = `${a} + ${b} = ?`;

    let answers = [correctAnswer];

    while (answers.length < 4) {
        let wrong = correctAnswer + Math.floor(Math.random() * 10) - 5;
        if (!answers.includes(wrong) && wrong >= 0) {
            answers.push(wrong);
        }
    }

    answers.sort(() => Math.random() - 0.5);

    let buttons = document.querySelectorAll(".btn");
    buttons.forEach((btn, i) => {
        btn.innerText = answers[i];
    });
}

function checkAnswer(btn) {
    if (parseInt(btn.innerText) === correctAnswer) {
        score += 10;
        alert("✅ ¡Bien!");
    } else {
        alert("❌ Intenta otra vez");
    }

    document.getElementById("score").innerText = "⭐ Puntos: " + score;
    newQuestion();
}

function countdown() {
    time--;
    document.getElementById("timer").innerText = "⏱ Tiempo: " + time;

    if (time <= 0) {
        alert("⏰ Fin del juego. Puntos: " + score);
        location.reload();
    }
}

setInterval(countdown, 1000);

newQuestion();
</script>

</body>
</html>
