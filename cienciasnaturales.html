<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brainrot Biomas Pixel</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    image-rendering:pixelated;
}

body{
    background:#7ec0ee;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
    font-family:'Press Start 2P', cursive;
    transition:0.2s;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    linear-gradient(rgba(255,255,255,0.03) 50%, transparent 50%);
    background-size:100% 4px;
    pointer-events:none;
}

#startScreen{
    position:fixed;
    inset:0;
    background:#4f8fba;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.start-box{
    width:550px;
    background:#f4f4d7;
    border:6px solid #000;
    padding:25px;
    text-align:center;
    box-shadow:12px 12px 0 #000;
}

.start-box h1{
    font-size:28px;
    margin-bottom:20px;
    line-height:1.5;
}

.start-box p{
    font-size:11px;
    line-height:2;
    margin-bottom:20px;
}

.start-box img{
    width:100%;
    height:250px;
    object-fit:cover;
    border:5px solid #000;
    margin-bottom:20px;
}

.game{
    width:950px;
    background:#f4f4d7;
    border:6px solid #000;
    padding:20px;
    box-shadow:12px 12px 0 #000;
}

h1{
    text-align:center;
    font-size:24px;
    margin-bottom:20px;
    line-height:1.5;
}

.top{
    display:flex;
    gap:20px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.animal-box{
    flex:1;
    min-width:250px;
}

.animal-box img{
    width:100%;
    height:320px;
    object-fit:cover;
    border:5px solid #000;
}

.info{
    flex:1;
    min-width:250px;
    background:white;
    border:5px solid #000;
    padding:20px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.info h2{
    font-size:18px;
    margin-bottom:20px;
    line-height:1.6;
}

.info p{
    font-size:11px;
    line-height:2;
}

.question{
    text-align:center;
    margin-bottom:20px;
    font-size:14px;
    line-height:1.8;
}

.options{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
}

.option{
    background:white;
    border:5px solid #000;
    cursor:pointer;
    transition:0.15s;
}

.option:hover{
    transform:translate(-4px,-4px);
    box-shadow:6px 6px 0 #000;
}

.option img{
    width:100%;
    height:120px;
    object-fit:cover;
    border-bottom:5px solid #000;
}

.option p{
    text-align:center;
    padding:12px;
    font-size:10px;
    line-height:1.6;
}

button{
    margin-top:20px;
    padding:15px 20px;
    background:#ffcc00;
    border:5px solid #000;
    font-family:'Press Start 2P', cursive;
    font-size:12px;
    cursor:pointer;
    box-shadow:6px 6px 0 #000;
}

button:hover{
    transform:translate(-3px,-3px);
    box-shadow:9px 9px 0 #000;
}

#result{
    margin-top:20px;
    text-align:center;
    font-size:16px;
    min-height:30px;
    line-height:1.5;
}

@keyframes correctAnim{

    0%{
        transform:scale(1);
    }

    25%{
        transform:scale(1.08);
    }

    50%{
        transform:scale(0.95);
    }

    100%{
        transform:scale(1);
    }

}

@keyframes wrongAnim{

    0%{
        transform:translateX(0);
    }

    20%{
        transform:translateX(-10px);
    }

    40%{
        transform:translateX(10px);
    }

    60%{
        transform:translateX(-10px);
    }

    80%{
        transform:translateX(10px);
    }

    100%{
        transform:translateX(0);
    }

}

.correct{
    border-color:#00ff00 !important;
    animation:correctAnim 0.5s;
    box-shadow:0 0 25px #00ff00;
}

.wrong{
    border-color:#ff0000 !important;
    animation:wrongAnim 0.4s;
    box-shadow:0 0 25px #ff0000;
}

@media(max-width:700px){

    .game{
        width:100%;
    }

    .start-box{
        width:100%;
    }

    h1{
        font-size:18px;
    }

    .info h2{
        font-size:14px;
    }

}

</style>
</head>
<body>

<div id="startScreen">

    <div class="start-box">

        <h1>🌎 BRAINROT BIOMAS</h1>

        <p>
            Relaciona cada criatura con el bioma correcto.
        </p>

        <img src="https://images.airdroid.com/es/parent-control/brainrot-italiano.png">

        <button onclick="startGame()">
            INICIAR JUEGO
        </button>

    </div>

</div>

<div class="game">

    <h1>MINIJUEGO DE BIOMAS</h1>

    <div class="top">

        <div class="animal-box">
            <img id="animalImage" src="">
        </div>

        <div class="info">
            <h2 id="animalName"></h2>
            <p id="animalDesc"></p>
        </div>

    </div>

    <div class="question">
        ¿A QUÉ BIOMA PERTENECE?
    </div>

    <div class="options" id="options"></div>

    <div id="result"></div>

    <center>
        <button onclick="nextQuestion()">
            SIGUIENTE
        </button>
    </center>

</div>

<script>

function startGame(){

    document.getElementById("startScreen").style.display = "none";

}

const biomes = [

    {
        name:"Acuático",
        image:"https://images.unsplash.com/photo-1544551763-46a013bb70d5?q=80&w=1000&auto=format&fit=crop"
    },

    {
        name:"Pradera",
        image:"https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1000&auto=format&fit=crop"
    },

    {
        name:"Bosque",
        image:"https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1000&auto=format&fit=crop"
    },

    {
        name:"Desierto",
        image:"https://images.unsplash.com/photo-1509316785289-025f5b846b35?q=80&w=1000&auto=format&fit=crop"
    },

    {
        name:"Tundra",
        image:"https://images.unsplash.com/photo-1517783999520-f068d7431a60?q=80&w=1000&auto=format&fit=crop"
    }

];

const questions = [

    {
        animal:"Brr Brr Patapim",
        desc:"Esta criatura habita zonas boscosas con abundante vegetación y árboles altos.",
        image:"https://i.ytimg.com/vi/hZEPOty8L1Q/maxresdefault.jpg",
        correct:"Bosque"
    },

    {
        animal:"Tralalero Tralala",
        desc:"Ser acuático que vive principalmente en mares y océanos.",
        image:"https://cloudfront-eu-central-1.images.arcpublishing.com/prisaradiolos40/Z25IJ4D5B5C35FXQAB36CR5ZD4.png",
        correct:"Acuático"
    },

    {
        animal:"Bombardiro Crocodilo",
        desc:"Puede sobrevivir en regiones áridas con altas temperaturas y poca agua.",
        image:"https://i1.sndcdn.com/artworks-AtoLRjVHCEez03hb-gesM5Q-t1080x1080.png",
        correct:"Desierto"
    },

    {
        animal:"Tung Tung Tung Sahur",
        desc:"Habita llanuras abiertas cubiertas de pasto y vegetación baja.",
        image:"https://theimpactlawyers.com/data/articles/z2nrk85/EadyKCGJkt7d7HNSNxGQ208pO1EpvnzRaEE51w20xwFUF2fOkl_l.jpg",
        correct:"Pradera"
    },

    {
        animal:"Ballerina Cappuccina",
        desc:"Se encuentra en regiones frías y congeladas durante gran parte del año.",
        image:"https://m.media-amazon.com/images/I/71Lr03fOoJL._AC_UF350,350_QL80_.jpg",
        correct:"Tundra"
    },

    {
        animal:"Chimpanzini Bananini",
        desc:"Vive en áreas boscosas con abundante vegetación.",
        image:"https://is1-ssl.mzstatic.com/image/thumb/Music211/v4/59/63/78/5963782e-215e-d73b-645a-f4569b1dbd31/artwork.jpg/1200x630bb.jpg",
        correct:"Bosque"
    },

    {
        animal:"Tripi tropi tropa tripa",
        desc:"Habita ecosistemas acuáticos de gran profundidad.",
        image:"https://i.scdn.co/image/ab67616d0000b2732e4d3dfe44031ba3aabcf77a",
        correct:"Acuático"
    },

    {
        animal:"Lirili larila",
        desc:"Está adaptado a condiciones de calor extremo y poca humedad.",
        image:"https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/48ed303e-a374-4a69-bdcf-1ecbc2b1bfbe/djt6zdf-7acc215d-3e77-44cb-a407-fb93ef1e4534.jpg",
        correct:"Desierto"
    },

    {
        animal:"Boneca ambalu",
        desc:"Habita grandes extensiones de pastizales y terrenos abiertos.",
        image:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS1ACVu-GJ_ApMqv0OOPAWy98IKWINdtFQFnQ&s",
        correct:"Pradera"
    },

    {
        animal:"La vaca saturno saturnita",
        desc:"Sobrevive en regiones con temperaturas extremadamente bajas.",
        image:"https://makerworld.bblmw.com/makerworld/model/DSM00000001281750/design/2025-04-03_9b362bd169916.jpg",
        correct:"Tundra"
    }

];

questions.sort(() => Math.random() - 0.5);

let current = 0;

function loadQuestion(){

    const q = questions[current];

    document.getElementById("animalName").innerText = q.animal;
    document.getElementById("animalDesc").innerText = q.desc;
    document.getElementById("animalImage").src = q.image;

    const optionsDiv = document.getElementById("options");

    optionsDiv.innerHTML = "";

    const shuffledBiomes = [...biomes].sort(() => Math.random() - 0.5);

    shuffledBiomes.forEach(b => {

        const div = document.createElement("div");

        div.classList.add("option");

        div.innerHTML = `
            <img src="${b.image}">
            <p>${b.name}</p>
        `;

        div.onclick = () => checkAnswer(div, b.name);

        optionsDiv.appendChild(div);

    });

    document.getElementById("result").innerText = "";

}

function checkAnswer(element, answer){

    const correct = questions[current].correct;

    const allOptions = document.querySelectorAll(".option");

    allOptions.forEach(opt => {

        opt.style.pointerEvents = "none";

    });

    if(answer === correct){

        element.classList.add("correct");

        document.getElementById("result").innerText = "CORRECTO";

        document.body.style.background = "#8cff98";

        setTimeout(() => {

            document.body.style.background = "#7ec0ee";

        }, 400);

    }else{

        element.classList.add("wrong");

        document.getElementById("result").innerText = "INCORRECTO";

        document.body.style.background = "#ff8c8c";

        setTimeout(() => {

            document.body.style.background = "#7ec0ee";

        }, 400);

    }

}

function nextQuestion(){

    current++;

    if(current >= questions.length){

        questions.sort(() => Math.random() - 0.5);

        current = 0;

    }

    loadQuestion();

}

loadQuestion();

</script>

</body>
</html>
