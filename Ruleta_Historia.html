<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta de Historia de México</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f1ec;
        text-align: center;
    }

    h1 {
        color: #006847;
    }

    .ruleta {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        margin: 20px auto;
        background: conic-gradient(
            #ce1126 0deg 90deg,
            #006847 90deg 180deg,
            #ce1126 180deg 270deg,
            #006847 270deg 360deg
        );
        border: 8px solid #333;
        transition: transform 2s ease-out;
    }

    .flecha {
        width: 0;
        height: 0;
        border-left: 15px solid transparent;
        border-right: 15px solid transparent;
        border-bottom: 30px solid #333;
        margin: auto;
    }

    .container {
        width: 450px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 15px;
    }

    button {
        padding: 10px 20px;
        font-size: 16px;
        background: #006847;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        margin-top: 15px;
    }

    .options button {
        background: #ce1126;
        margin: 5px 0;
        width: 100%;
    }

    .correct {
        background: #006847 !important;
    }

    .wrong {
        background: #444 !important;
    }

    #feedback {
        font-weight: bold;
        margin-top: 10px;
    }
</style>
</head>

<body>

<h1>🎡 Ruleta de Historia de México</h1>

<div class="flecha"></div>
<div class="ruleta" id="ruleta"></div>

<button onclick="spin()">🎡 Girar ruleta</button>

<div class="container">
    <div id="question"></div>
    <div class="options" id="options"></div>
    <div id="feedback"></div>
</div>

<script>
    const preguntas = [
        {
            question: "¿En qué año inició la Independencia de México?",
            options: ["1810", "1821", "1910", "1808"],
            answer: "1810"
        },
        {
            question: "¿Quién dio el Grito de Dolores?",
            options: ["Miguel Hidalgo", "Benito Juárez", "Morelos", "Vicente Guerrero"],
            answer: "Miguel Hidalgo"
        },
        {
            question: "¿En qué año comenzó la Revolución Mexicana?",
            options: ["1900", "1910", "1917", "1920"],
            answer: "1910"
        },
        {
            question: "¿Qué presidente impulsó las Leyes de Reforma?",
            options: ["Porfirio Díaz", "Benito Juárez", "Madero", "Cárdenas"],
            answer: "Benito Juárez"
        }
    ];

    const ruleta = document.getElementById("ruleta");
    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const feedbackEl = document.getElementById("feedback");

    let rotation = 0;

    function spin() {
        feedbackEl.textContent = "";
        optionsEl.innerHTML = "";
        questionEl.textContent = "";

        rotation += Math.floor(Math.random() * 360) + 720;
        ruleta.style.transform = "rotate(" + rotation + "deg)";

        setTimeout(showQuestion, 2000);
    }

    function showQuestion() {
        const q = preguntas[Math.floor(Math.random() * preguntas.length)];
        questionEl.textContent = q.question;
        optionsEl.innerHTML = "";

        q.options.forEach(opt => {
            const btn = document.createElement("button");
            btn.textContent = opt;
            btn.onclick = () => checkAnswer(btn, opt, q.answer);
            optionsEl.appendChild(btn);
        });
    }

    function checkAnswer(button, selected, correct) {
        Array.from(optionsEl.children).forEach(b => b.disabled = true);

        if (selected === correct) {
            button.classList.add("correct");
            feedbackEl.textContent = "✅ Respuesta correcta";
        } else {
            button.classList.add("wrong");
            feedbackEl.textContent = "❌ Incorrecto. Respuesta correcta: " + correct;
        }
    }
</script>

</body>
</html>
