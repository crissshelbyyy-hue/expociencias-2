<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Trivia de Historia de México</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f1ec;
        text-align: center;
    }

    h1 {
        color: #006847;
    }

    .container {
        width: 500px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    .question {
        font-size: 18px;
        margin-bottom: 15px;
    }

    .options button {
        display: block;
        width: 100%;
        margin: 8px 0;
        padding: 10px;
        font-size: 16px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: #ce1126;
        color: white;
    }

    .options button:hover {
        background: #a50e1f;
    }

    .correct {
        background: #006847 !important;
    }

    .wrong {
        background: #444 !important;
    }

    #feedback {
        margin-top: 10px;
        font-size: 16px;
        font-weight: bold;
    }

    #nextBtn {
        margin-top: 15px;
        padding: 10px 20px;
        background: #006847;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        display: none;
    }

    #score {
        font-size: 20px;
        font-weight: bold;
        margin-top: 10px;
    }
</style>
</head>

<body>

<h1>🧠 Trivia de Historia de México</h1>

<div class="container">
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div id="feedback"></div>
    <button id="nextBtn" onclick="nextQuestion()">Siguiente</button>
    <div id="score"></div>
</div>

<script>
    const trivia = [
        {
            question: "¿En qué año inició la Independencia de México?",
            options: ["1810", "1821", "1910", "1808"],
            answer: "1810"
        },
        {
            question: "¿Quién dio el Grito de Dolores?",
            options: ["Miguel Hidalgo", "Benito Juárez", "Morelos", "Vicente Guerrero"],
            answer: "Miguel Hidalgo"
        },
        {
            question: "¿Qué civilización fue conquistada en 1521?",
            options: ["Maya", "Azteca", "Olmeca", "Tolteca"],
            answer: "Azteca"
        },
        {
            question: "¿En qué año comenzó la Revolución Mexicana?",
            options: ["1900", "1910", "1917", "1920"],
            answer: "1910"
        }
    ];

    let currentQuestion = 0;
    let score = 0;

    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const feedbackEl = document.getElementById("feedback");
    const nextBtn = document.getElementById("nextBtn");
    const scoreEl = document.getElementById("score");

    function loadQuestion() {
        feedbackEl.textContent = "";
        nextBtn.style.display = "none";
        questionEl.textContent = trivia[currentQuestion].question;
        optionsEl.innerHTML = "";

        trivia[currentQuestion].options.forEach(option => {
            const btn = document.createElement("button");
            btn.textContent = option;
            btn.onclick = () => checkAnswer(btn, option);
            optionsEl.appendChild(btn);
        });
    }

    function checkAnswer(button, selected) {
        const correct = trivia[currentQuestion].answer;

        Array.from(optionsEl.children).forEach(btn => btn.disabled = true);

        if (selected === correct) {
            button.classList.add("correct");
            feedbackEl.textContent = "✅ Respuesta correcta";
            score++;
        } else {
            button.classList.add("wrong");
            feedbackEl.textContent = "❌ Respuesta incorrecta. La respuesta correcta es: " + correct;
        }

        nextBtn.style.display = "block";
    }

    function nextQuestion() {
        currentQuestion++;
        if (currentQuestion < trivia.length) {
            loadQuestion();
        } else {
            showScore();
        }
    }

    function showScore() {
        questionEl.textContent = "🎉 Trivia finalizada";
        optionsEl.innerHTML = "";
        feedbackEl.textContent = "";
        nextBtn.style.display = "none";
        scoreEl.textContent = "Tu puntaje: " + score + " / " + trivia.length;
    }

    loadQuestion();
</script>

</body>
</html>
